version: 2

project_name: yametrika-mcp

# ── Before hooks ──────────────────────────────────────────────────────────────
before:
  hooks:
    - go mod tidy
    - go mod verify
    - go vet ./...

# ── Builds ────────────────────────────────────────────────────────────────────
builds:
  - id: yametrika-mcp
    main: ./cmd/server
    binary: yametrika-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64   # Windows ARM64 не нужен
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.date={{ .Date }}
    mod_timestamp: "{{ .CommitTimestamp }}"

# ── Archives ──────────────────────────────────────────────────────────────────
archives:
  - id: default
    formats: [tar.gz]
    # Windows → .zip
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- if and (eq .Os "darwin") (eq .Arch "amd64") }}darwin_amd64_intel
      {{- else if and (eq .Os "darwin") (eq .Arch "arm64") }}darwin_arm64_silicon
      {{- else }}{{ .Os }}_{{ .Arch }}
      {{- end }}
    files:
      - README.md
      - LICENSE*
      - CHANGELOG.md
      - .env.example
      - opencode.jsonc

# ── Checksums ─────────────────────────────────────────────────────────────────
checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# ── Changelog ─────────────────────────────────────────────────────────────────
changelog:
  use: github
  sort: asc
  abbrev: -1   # full commit hash
  groups:
    - title: "🚀 New Features"
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: "🐛 Bug Fixes"
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: "⚡ Performance"
      regexp: '^.*?perf(\(.+\))??!?:.+$'
      order: 2
    - title: "🔧 Improvements"
      regexp: '^.*?(refactor|chore|build|ci)(\(.+\))??!?:.+$'
      order: 3
    - title: "📖 Documentation"
      regexp: '^.*?docs(\(.+\))??!?:.+$'
      order: 4
    - title: "Other changes"
      order: 999
  filters:
    exclude:
      - "^Merge "
      - "^chore(deps):"
      - "typo"

# ── GitHub Release ─────────────────────────────────────────────────────────────
release:
  github:
    owner: ivanshamaev
    name: mcp-server
  name_template: "{{ .ProjectName }} {{ .Tag }}"
  header: |
    ## Yandex Metrika MCP Server {{ .Tag }}

    MCP сервер для интеграции Yandex Metrika с opencode и Claude Code.
    Протокол: JSON-RPC 2.0 (stdio), совместим с MCP spec `2024-11-05`.

    ### Установка

    ```bash
    # Linux / macOS
    curl -sL https://github.com/ivanshamaev/mcp-server/releases/download/{{ .Tag }}/yametrika-mcp_{{ .Version }}_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/').tar.gz | tar xz
    chmod +x yametrika-mcp
    ```

    ### Конфиг opencode

    ```jsonc
    {
      "mcp": {
        "yandex-metrika": {
          "type": "local",
          "command": ["/path/to/yametrika-mcp"],
          "enabled": true,
          "env": { "ACCESS_TOKEN": "your_token" }
        }
      }
    }
    ```

  footer: |
    ---
    **Полная документация:** [CLAUDE.md](https://github.com/ivanshamaev/mcp-server/blob/main/CLAUDE.md)
    **Yandex Metrika API:** https://yandex.ru/dev/metrika/doc/api2/concept/about.html

  # Помечать pre-release если тег содержит -alpha, -beta, -rc
  prerelease: auto
  draft: false

# ── Snapshot (локальная сборка без тега) ──────────────────────────────────────
snapshot:
  version_template: "{{ .Version }}-snapshot-{{ .ShortCommit }}"

